name: CI — Tests

#  Se ejecuta en cada push a cualquier rama
# y en cada Pull Request hacia main
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest  # ← GitHub te da una VM Ubuntu gratis

    #  Servicio de PostgreSQL para los tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workers_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

          
    steps:
      # 1. Clona el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # 3. Instala dependencias del backend
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # 4. Corre los tests
      # Las variables de entorno de test van aquí
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci
          #  Usamos una DB en memoria para los tests
          # No necesitamos Supabase real para testear
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/workers_test

      # 5. Corre los tests del frontend (si los hay)
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      #  Verificamos que el frontend compila sin errores
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://workers-saas-backend.onrender.com