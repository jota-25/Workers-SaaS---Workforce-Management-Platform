server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # ✅ Esto es crucial para React Router
        # Si el usuario recarga /dashboard, Nginx sirve index.html
        # y React Router maneja la ruta internamente
        try_files $uri $uri/ /index.html;
    }
}